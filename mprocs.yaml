# Dev procs. `just dev` starts these under mprocs.
#
# `dx serve` runs the Dioxus SPA on :5173 with auto-rebuild on .rs / .css /
# asset edits. The dev-proxy config in crates/web/Dioxus.toml forwards /api,
# /c, /m, /h to the axum server on :8080. The browser hits :5173; the
# server's CORS_ALLOWED_ORIGINS allow-lists that origin so cookies travel.
procs:
  web:
    shell: "cd crates/web && dx serve --port 5173"
  server:
    shell: |
      DATABASE_URL=${DATABASE_URL:-postgres://pastedev:pastedev@localhost:5432/pastedev} \
      PASTEDEV_SECRET=${PASTEDEV_SECRET:-dev-secret-replace-in-production-only-here-for-local} \
      PUBLIC_BASE_URL=http://localhost:5173 \
      SESSION_COOKIE_SECURE=false \
      CORS_ALLOWED_ORIGINS=http://localhost:5173 \
      RUST_ENV=dev \
      cargo run -p pastedev-server
  db-logs:
    shell: "docker compose logs -f db"
